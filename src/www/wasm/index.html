<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FluffOS — WebAssembly driver</title>
<link rel="stylesheet" href="vendor/xterm.css">
<style>
  :root {
    --bg: #0b0e14; --fg: #d5dbe5; --dim: #6b7484; --accent: #7aa2f7;
    --panel: #11151f; --border: #232a38;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.45 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    display: flex; flex-direction: column;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel); display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; color: var(--accent); font-weight: 600; }
  header #status { color: var(--dim); font-size: 12px; }
  #term { flex: 1; min-height: 0; padding: 6px 8px; }
  #term .xterm { height: 100%; }
  #jscanvas {
    display: none; position: fixed; right: 16px; top: 56px;
    border: 1px solid var(--border); border-radius: 6px; background: #04060a;
    z-index: 10;
  }
  #inputbar {
    display: flex; border-top: 1px solid var(--border); background: var(--panel);
  }
  #inputbar.hidden { display: none; }
  #inputbar .prompt { padding: 10px 0 10px 16px; color: var(--accent); }
  #cmd {
    flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg);
    font: inherit; padding: 10px 16px 10px 8px;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 10, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; z-index: 1000;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    width: min(720px, 100%); max-height: 85vh; display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 {
    margin: 0; font-size: 15px; color: #f7768e; font-weight: 600;
  }
  .modal-close {
    background: transparent; border: 0; color: var(--dim); font-size: 20px;
    line-height: 1; cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { color: var(--fg); background: var(--border); }
  .modal-body { padding: 14px 18px; overflow-y: auto; }
  .modal-message {
    margin: 0 0 12px; color: var(--fg); font-size: 13px; white-space: pre-wrap;
    word-break: break-word;
  }
  .modal-body details { margin-top: 8px; }
  .modal-body summary {
    cursor: pointer; color: var(--dim); font-size: 12px; user-select: none;
  }
  .modal-body pre {
    margin: 8px 0 0; padding: 10px; background: #04060a; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; white-space: pre-wrap; word-break: break-word;
    max-height: 40vh; overflow-y: auto; color: var(--dim);
  }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 12px 18px; border-top: 1px solid var(--border);
  }
  .modal-footer button {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 14px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .modal-footer button:hover { border-color: var(--accent); color: var(--accent); }
  .modal-footer button.primary { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>FluffOS / WebAssembly</h1>
  <div id="status">loading wasm…</div>
</header>
<div id="term"></div>
<canvas id="jscanvas" width="300" height="130"></canvas>
<div id="inputbar">
  <span class="prompt">&gt;</span>
  <input id="cmd" autocomplete="off" spellcheck="false" autofocus
         placeholder="loading…" disabled>
</div>

<div id="errorModal" class="modal-overlay" hidden>
  <div class="modal" role="alertdialog" aria-labelledby="errorModalTitle">
    <div class="modal-header">
      <h2 id="errorModalTitle">Driver crashed</h2>
      <button id="errorModalClose" class="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <p id="errorModalMessage" class="modal-message"></p>
      <details id="errorModalDetails">
        <summary>Stack trace &amp; debug info</summary>
        <pre id="errorModalStack"></pre>
      </details>
    </div>
    <div class="modal-footer">
      <button id="errorModalCopy">Copy details</button>
      <button id="errorModalReload" class="primary">Reload page</button>
    </div>
  </div>
</div>

<script>
  // Crash/error reporting -- wired up before the wasm runtime scripts load
  // so it can catch failures during script loading, instantiation, and
  // execution alike (load failure, runtime abort, uncaught exception,
  // unhandled promise rejection).
  const ErrorModal = (() => {
    const overlay = document.getElementById('errorModal');
    const titleEl = document.getElementById('errorModalTitle');
    const messageEl = document.getElementById('errorModalMessage');
    const stackEl = document.getElementById('errorModalStack');

    const stringifyStack = (err) => {
      if (err instanceof Error) return err.stack || err.message;
      if (typeof err === 'object' && err !== null) {
        try { return JSON.stringify(err, null, 2); } catch (_) { return String(err); }
      }
      return String(err);
    };

    const show = (title, err, extra) => {
      titleEl.textContent = title;
      messageEl.textContent = err instanceof Error ? err.message : String(err);
      const lines = [stringifyStack(err)];
      lines.push('');
      lines.push('-- environment --');
      lines.push('time: ' + new Date().toISOString());
      lines.push('url: ' + location.href);
      lines.push('userAgent: ' + navigator.userAgent);
      if (extra) lines.push('', '-- context --', extra);
      stackEl.textContent = lines.join('\n');
      overlay.hidden = false;
    };

    document.getElementById('errorModalClose').addEventListener('click', () => {
      overlay.hidden = true;
    });
    document.getElementById('errorModalReload').addEventListener('click', () => {
      location.reload();
    });
    document.getElementById('errorModalCopy').addEventListener('click', async (ev) => {
      const text = titleEl.textContent + '\n' + messageEl.textContent + '\n\n' + stackEl.textContent;
      try {
        await navigator.clipboard.writeText(text);
        const btn = ev.currentTarget;
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 1500);
      } catch (_) { /* clipboard unavailable, ignore */ }
    });

    return { show };
  })();

  window.addEventListener('error', (ev) => {
    ErrorModal.show('Uncaught error', ev.error || ev.message);
  });
  window.addEventListener('unhandledrejection', (ev) => {
    ErrorModal.show('Unhandled promise rejection', ev.reason);
  });
</script>
<script>
  // Emscripten's WASI random_get() (src/lib/libwasi.js) fills entropy with
  // crypto.getRandomValues(HEAPU8.subarray(...)) directly against wasm
  // memory, with no shared/resizable guard. When the heap is backed by a
  // resizable ArrayBuffer (GROWABLE_ARRAYBUFFERS + ALLOW_MEMORY_GROWTH ->
  // wasmMemory.toResizableBuffer()), getRandomValues() throws on boot:
  // "The provided ArrayBufferView value must not be resizable". This is
  // not hypothetical: emsdk 6.0.2 DEFAULTED GROWABLE_ARRAYBUFFERS to 1 and
  // broke exactly this way in Chrome. 6.0.3 reverted the default and fixed
  // the sibling string-decode path in codegen (getUnsharedTextDecoderView
  // -> getHeapViewOrCopy, src/parseTools.mjs) -- but random_get() itself
  // is still unguarded upstream as of 6.0.3, so it breaks again the moment
  // the default flips back on. This wrapper is certified against the real
  // 6.0.2 failure: no-op on a non-resizable heap, copy-fill-copy on a
  // resizable/shared one. (CI pins emsdk -- see
  // .github/actions/build-wasm/action.yml -- this is the belt to that
  // suspender.)
  if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
    const originalGetRandomValues = crypto.getRandomValues.bind(crypto);
    crypto.getRandomValues = (view) => {
      const buf = view.buffer;
      const unsafe = buf && (buf.resizable ||
        (typeof SharedArrayBuffer !== 'undefined' && buf instanceof SharedArrayBuffer));
      if (!unsafe) return originalGetRandomValues(view);
      const copy = new Uint8Array(view.length);
      originalGetRandomValues(copy);
      new Uint8Array(buf, view.byteOffset, view.byteLength).set(copy);
      return view;
    };
  }
</script>
<script>
  // Mudlib image (created by emscripten's file_packager, see
  // tools/wasm/pack-mudlib.sh) attaches itself to this global before
  // the runtime factory consumes it.  pageLog is defined by the main
  // script below; these callbacks only fire after it exists.
  var Module = {
    print: (s) => pageLog(s),
    printErr: (s) => pageLog(s),
    locateFile: (f) => f,
    onAbort: (what) => {
      status.textContent = 'driver aborted';
      ErrorModal.show('WebAssembly runtime aborted', what,
        'The wasm module called abort() -- this usually means an ' +
        'unrecoverable native crash (assertion, OOM, illegal memory access).');
    },
  };
</script>
<script src="vendor/xterm.js"></script>
<script src="vendor/addon-fit.js"></script>
<script src="telnet.js"></script>
<script src="fluffos-boot.js"></script>
<script src="mudlib.js"></script>
<script src="fluffos.js"></script>
<script>
'use strict';

// ==========================================================================
// The web terminal: xterm.js does the terminal emulation (rendering, SGR,
// alternate screen, mouse reporting, bracketed paste, keyboard encoding);
// this page supplies the two things xterm.js does not:
//
//   TelnetClient  the telnet protocol: ECHO, SGA (= the driver's char-mode
//                 signal, src/net/telnet.cc set_charmode), NAWS, TTYPE.
//   input glue    line mode = the input bar (a MUD-style local-edit line);
//                 char mode = xterm.js keystrokes stream straight to the
//                 driver.  Switches automatically on the SGA negotiation.
// ==========================================================================

const term = new Terminal({
  fontFamily: '"SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace',
  fontSize: 14,
  scrollback: 2000,
  theme: {
    background: '#0b0e14', foreground: '#d5dbe5',
    cursor: '#d5dbe5', cursorAccent: '#0b0e14',
    black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
    blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
    brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
    brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
    brightCyan: '#7dcfff', brightWhite: '#c0caf5',
  },
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('term'));
fitAddon.fit();
window.term = term;   // devtools + tests

// Driver stdout/stderr (boot noise, debug_message) -- dim, above the game.
function pageLog(s) { term.write('\x1b[2m' + s + '\x1b[0m\r\n'); }

// (TelnetClient comes from the shared telnet.js)

// --- Boot ---------------------------------------------------------------
const status = document.getElementById('status');
const input = document.getElementById('cmd');
const inputBar = document.getElementById('inputbar');
const utf8enc = new TextEncoder();

// Mount point + config file, written by the packer (fluffos-boot.js).
if (!window.FLUFFOS_BOOT) {
  pageLog('warning: fluffos-boot.js missing (bundle not built by the ' +
          'packer?) — falling back to the testsuite defaults');
}
const BOOT = window.FLUFFOS_BOOT || { mount: '/testsuite', config: 'etc/config.test' };

createFluffOS(Module).then((M) => {
  status.textContent = 'booting driver…';
  M.FS.chdir(BOOT.mount);

  // The wasm bridge is synchronous BOTH ways: fluffos_input() can emit
  // output before it returns, and onOutput arrives while our telnet parser
  // is mid-byte-stream. Calling back into the driver from inside receive()
  // therefore re-enters the parser and corrupts its state (negotiation
  // ping-pong until stack overflow). Decouple both directions with queues:
  // sends flush from a 0-timeout (never inside receive()), and inbound
  // chunks drain through a non-reentrant loop.
  const connId = { value: -1 };
  const pendingIn = [];   // driver -> page, before the id is known
  const outbox = [];      // page -> driver, flushed outside receive()
  let flushScheduled = false;
  const flushOutbox = () => {
    flushScheduled = false;
    while (connId.value >= 0 && outbox.length) {
      const bytes = outbox.shift();
      M.ccall('fluffos_input', null, ['number', 'array', 'number'],
              [connId.value, bytes, bytes.length]);
    }
  };
  const sendToDriver = (bytes) => {
    outbox.push(bytes);
    if (connId.value >= 0 && !flushScheduled) {
      flushScheduled = true;
      setTimeout(flushOutbox, 0);
    }
  };
  const inbox = [];
  let receiving = false;
  const deliver = (bytes) => {
    inbox.push(bytes);
    if (receiving) return;
    receiving = true;
    try {
      while (inbox.length) telnet.receive(inbox.shift());
    } finally {
      receiving = false;
    }
  };
  const telnet = new TelnetClient(sendToDriver);
  telnet.onText = (t) => term.write(t);

  let charMode = false;
  let serverEchoes = false;
  telnet.onEcho = (on) => {
    serverEchoes = on;
    if (!charMode) input.type = on ? 'password' : 'text';
  };
  telnet.onCharMode = (on) => {
    if (on === charMode) return;
    charMode = on;
    if (on) {
      inputBar.classList.add('hidden');
      status.textContent = 'char mode — keys go straight to the mud';
      fitAddon.fit();
      term.focus();
    } else {
      inputBar.classList.remove('hidden');
      status.textContent = 'connected (conn ' + connId.value + ')';
      input.type = serverEchoes ? 'password' : 'text';
      fitAddon.fit();
      input.focus();
    }
  };

  // raw application data (telnet.sendRaw doubles IAC bytes)
  const sendData = (bytes) => telnet.sendRaw(bytes);

  // Char mode: xterm.js encodes keys, mouse reports and bracketed pastes
  // into the exact byte sequences a terminal would send -- forward them.
  term.onData((d) => {
    if (charMode) sendData(Array.from(utf8enc.encode(d)));
  });
  term.onBinary((d) => {
    if (charMode) sendData(Array.from(d, (c) => c.charCodeAt(0) & 0xff));
  });

  M.fluffos = {
    onOutput: (id, bytes) => {
      if (connId.value === -1) pendingIn.push(bytes);
      else if (id === connId.value) deliver(bytes);
    },
    onDisconnect: (id) => {
      if (id === connId.value) {
        pageLog('*** disconnected ***');
        input.disabled = true;
        status.textContent = 'disconnected';
      }
    },
    // JS handlers callable from LPC through the jsbridge package:
    //   js_call("fetch_text", ({ url }), (: callback :))
    //   js_call("canvas_draw", ({ "circle", x, y, r }))
    // Try it in the terminal: jsdemo fetch /index.html · jsdemo canvas
    handlers: {
      fetch_text: async (url) => (await fetch(url)).text(),
      canvas_draw: (op, ...a) => {
        const canvas = document.getElementById('jscanvas');
        canvas.style.display = 'block';
        const g = canvas.getContext('2d');
        switch (op) {
          case 'clear':
            g.clearRect(0, 0, canvas.width, canvas.height);
            break;
          case 'circle':
            g.beginPath();
            g.arc(+a[0], +a[1], +a[2], 0, 2 * Math.PI);
            g.fillStyle = 'hsl(' + ((+a[0] * 3) % 360) + ' 70% 60%)';
            g.fill();
            break;
          case 'text':
            g.fillStyle = '#d5dbe5';
            g.font = '13px monospace';
            g.fillText(a.slice(2).join(' '), +a[0], +a[1]);
            break;
          default:
            throw new Error('unknown canvas op: ' + op);
        }
        return op;
      },
    },
  };

  // The reverse direction: call LPC functions the mudlib registered with
  // js_export(). Returns a Promise of the (string) return value.
  //   lpc: js_export("add", (: ... :));
  //   js:  await fluffos.callLPC("add", "2", "3")   // -> "5"
  M.fluffos.callLPC = (name, ...args) => new Promise((resolve, reject) => {
    const id = M.ccall('fluffos_lpc_call', 'number', ['string', 'string'],
                       [name, JSON.stringify(args.map(String))]);
    if (id < 0) return reject(new Error('no such LPC export: ' + name));
    const pending = (M.fluffos._lpcPending = M.fluffos._lpcPending || {});
    pending[id] = { resolve, reject };
  });
  // Console convenience: `await fluffos.callLPC(...)` in devtools.
  window.fluffos = M.fluffos;

  const rc = M.ccall('fluffos_boot', 'number', ['string'], [BOOT.config]);
  if (rc !== 0) { status.textContent = 'boot failed (' + rc + ')'; return; }

  // Real geometry before connecting, so the NAWS answer to the driver's
  // initial DO NAWS carries it.
  telnet.size = { cols: term.cols, rows: term.rows };
  term.onResize(({ cols, rows }) => telnet.setSize(cols, rows));

  // Drive the game loop: heartbeats, call_outs and buffered commands all
  // run inside fluffos_tick().
  setInterval(() => {
    M.ccall('fluffos_tick', 'number', ['number'], [performance.now()]);
  }, 50);

  connId.value = M.ccall('fluffos_connect', 'number', [], []);
  for (const bytes of pendingIn.splice(0)) deliver(bytes);
  flushOutbox();   // negotiation replies buffered while connId was unknown
  status.textContent = 'connected (conn ' + connId.value + ')';
  input.disabled = false;
  input.placeholder = 'type a command — try: eval return 1+1, tuidemo, who';
  input.focus();

  // window resize -> refit xterm -> onResize fires -> NAWS; the driver
  // re-fires the window_size apply, so full-screen TUIs relayout live.
  let resizeTimer = 0;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => fitAddon.fit(), 120);
  });

  // --- line mode input ---
  input.addEventListener('keydown', (ev) => {
    if (ev.key !== 'Enter') return;
    const line = input.value;
    input.value = '';
    if (input.type !== 'password') term.write(line + '\r\n');
    sendData(Array.from(utf8enc.encode(line + '\r\n')));
  });
}).catch((e) => {
  status.textContent = 'failed to load: ' + e;
  ErrorModal.show('Failed to load WebAssembly driver', e,
    'mount: ' + BOOT.mount + '\nconfig: ' + BOOT.config);
});
</script>
</body>
</html>
