name: Build FluffOS (Windows / MSYS2)
description: >-
  Install MSYS2/MinGW64 dependencies, configure, build and test the Windows
  driver. Shared by the CI `windows` job and the release `build-windows` job
  so the two can't drift. The caller must run msys2/setup-msys2 first and
  default its shell to `msys2 {0}`. Leaves the installed tree in build/bin/
  for the caller to package. Keep the pacman list below in sync with
  README.md's Windows (MSYS2) section.

inputs:
  build-type:
    description: CMake build type.
    default: RelWithDebInfo
  db-sqlite:
    description: PACKAGE_DB_SQLITE mode (1 = bundled, 2 = system libsqlite3).
    default: '2'
  extra-packages:
    description: >-
      Extra pacman packages beyond the shared build set below (e.g. `flex` to
      regenerate the lexer in CI, or `zip` to package the release archive).
    default: ''

runs:
  using: composite
  steps:
    - name: Install dependencies (MSYS2)
      shell: 'msys2 {0}'
      run: |
        pacman --noconfirm -S --needed \
          mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-zlib \
          mingw-w64-x86_64-pcre mingw-w64-x86_64-icu mingw-w64-x86_64-sqlite3 \
          mingw-w64-x86_64-jemalloc mingw-w64-x86_64-gtest \
          mingw-w64-x86_64-pkgconf mingw-w64-x86_64-libffi \
          bison make ${{ inputs.extra-packages }}

    - name: Configure & build
      shell: 'msys2 {0}'
      run: |
        mkdir build && cd build
        cmake -G "MSYS Makefiles" \
          -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} \
          -DMARCH_NATIVE=OFF \
          -DPACKAGE_CRYPTO=OFF \
          -DPACKAGE_DB_MYSQL="" \
          -DPACKAGE_DB_SQLITE=${{ inputs.db-sqlite }} \
          ..
        VERBOSE=1 make -j 2 install

    - name: Run tests
      shell: 'msys2 {0}'
      run: |
        cd build
        ctest --output-on-failure -LE testsuite
        ctest --output-on-failure -L testsuite
