name: Build WASM driver
description: >-
  Cross-compile the FluffOS driver to WebAssembly with a pinned emsdk and
  run the full LPC testsuite inside the wasm driver under node. Shared by the
  CI `wasm` job and the release `build-wasm` job so the two can't drift.
  Leaves the built driver in build-wasm/src/ for the caller to package.

inputs:
  emsdk-ver:
    description: >-
      Emscripten SDK version. Pinned rather than "latest": 6.0.2 defaulted
      GROWABLE_ARRAYBUFFERS to 1, so any ALLOW_MEMORY_GROWTH build got a
      heap backed by a resizable ArrayBuffer (wasmMemory.toResizableBuffer())
      in browsers that ship the wasm rab-integration -- and two runtime
      paths pass raw HEAPU8.subarray() views into Web APIs that reject
      resizable-backed views: random_get() -> crypto.getRandomValues()
      (threw on boot: "The provided ArrayBufferView value must not be
      resizable") and UTF8ToString()/stringToUTF8ToString() -> TextDecoder
      (breaking packages/jsbridge). 6.0.3 reverted the default AND fixed
      the string codegen (getUnsharedTextDecoderView -> getHeapViewOrCopy,
      src/parseTools.mjs), but random_get() is still unguarded upstream --
      src/www/wasm/index.html carries a crypto.getRandomValues wrapper for
      when the default flips back on. Bump this deliberately, not by
      tracking latest, and re-check libwasi.js random_get() when you do.
    default: '6.0.3'
  icu-ver:
    description: ICU release version cross-built for wasm (feeds the deps cache key).
    default: '74-2'
  deps-prefix:
    description: Install prefix for the wasm-cross-built dependencies (ICU).
    default: /opt/wasm-deps

runs:
  using: composite
  steps:
    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: ${{ inputs.emsdk-ver }}
        actions-cache-folder: emsdk-cache

    - name: Resolve emscripten version
      id: emver
      shell: bash
      run: echo "version=$(emcc -dumpversion)" >> "$GITHUB_OUTPUT"

    - name: Install native dependencies
      shell: bash
      run: |
        sudo apt update
        sudo apt install -y build-essential bison flex libssl-dev libicu-dev zip

    # The deps prefix must exist and be runner-writable BEFORE the cache
    # step: on a cache hit, actions/cache restores into it directly.
    - name: Prepare wasm deps prefix
      shell: bash
      run: |
        sudo mkdir -p "${{ inputs.deps-prefix }}"
        sudo chown "$USER" "${{ inputs.deps-prefix }}"

    # ICU cross-built for wasm32; ~10 minutes on a miss, so cache on the
    # resolved emsdk + upstream versions (bump the -vN suffix to invalidate).
    - name: Cache wasm dependencies (ICU)
      id: wasm-deps
      uses: actions/cache@v4
      with:
        path: ${{ inputs.deps-prefix }}
        key: wasm-deps-emsdk${{ steps.emver.outputs.version }}-icu${{ inputs.icu-ver }}-v3

    - name: Build wasm dependencies
      if: steps.wasm-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        WORK="$RUNNER_TEMP/wasm-deps-build" ICU_VER="${{ inputs.icu-ver }}" \
          tools/wasm/build-deps.sh

    - name: Build driver (native tools + wasm)
      shell: bash
      run: tools/wasm/build.sh

    - name: Run LPC testsuite in the wasm driver
      shell: bash
      run: node tools/wasm/run-testsuite.js

    # The wasm lpcc (NODERAWFS node CLI, shipped by the fluffos-vscode
    # extension): compile a real testsuite file and check the --json
    # tokens envelope comes back.
    - name: Smoke-test wasm lpcc
      shell: bash
      run: |
        cd testsuite
        node ../build-wasm/src/lpcc.js --json --tokens etc/config.test single/tests/efuns/dual_extension.lpc \
          | grep -q '"fluffos_lpcc"'
        echo "wasm lpcc OK"
