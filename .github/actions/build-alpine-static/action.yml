name: Build FluffOS (static, Alpine)
description: >-
  Build the statically-linked (musl) Linux driver inside an Alpine container
  and run its tests. Shared by the CI `alpine-static` job and the release
  `build-linux` job so the exact dependency list and cmake config that ships
  as fluffos-<version>-linux-x86_64-static.tar.gz is exercised on every PR.
  Leaves the installed tree in build/bin/ for the caller to package. Keep the
  apk list below in sync with README.md's Alpine section.

inputs:
  build-type:
    description: CMake build type.
    default: RelWithDebInfo

runs:
  using: composite
  steps:
    # The build script is fed to the container over stdin via a QUOTED
    # heredoc (<<'DOCKER'): the outer shell passes it through untouched, so
    # apostrophes/quotes in comments can never break it (a single-quoted
    # `sh -c '...'` string is a footgun -- one apostrophe ends the quote and
    # the rest runs on the host). build-type crosses in as an env var.
    - name: Build and test in Alpine (static)
      shell: bash
      run: |
        docker run --rm -i -e "BUILD_TYPE=${{ inputs.build-type }}" \
          -v "$PWD":/workspace -w /workspace alpine:3.18 sh -s <<'DOCKER'
        set -e

        apk add --no-progress --no-cache \
          linux-headers gcc g++ clang-dev make cmake bash \
          mariadb-dev mariadb-static postgresql-dev sqlite-dev sqlite-static \
          openssl-dev openssl-libs-static zlib-dev zlib-static icu-dev icu-static \
          pcre-dev bison git musl-dev libelf-static elfutils-dev \
          pkgconf libffi-dev zstd-static bzip2-static xz-static tar

        # jemalloc: Alpine has no static jemalloc package, so build it.
        cd /tmp
        wget -q -O - https://github.com/jemalloc/jemalloc/releases/download/5.3.0/jemalloc-5.3.0.tar.bz2 | tar -xj
        cd jemalloc-5.3.0
        ./configure --prefix=/usr && make -j"$(nproc)" && make install

        # Build the static driver. It embeds ICU's data blob (see
        # FLUFFOS_EMBED_ICU_DATA / init_static_icu_data in mainlib.cc) so
        # table-based charsets like GBK/Big5 work without an external
        # icudtXX.dat file, the same as the dynamic and Docker builds.
        cd /workspace
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE="${BUILD_TYPE:-RelWithDebInfo}" -DMARCH_NATIVE=OFF -DSTATIC=ON
        make -j"$(nproc)" install

        # The full suite must pass on the static build too (gating).
        ctest --output-on-failure -LE testsuite
        ctest --output-on-failure -L testsuite

        # Confirm the driver really is statically linked.
        if ldd bin/driver 2>/dev/null; then
          echo "WARNING: bin/driver is not fully static"
        else
          echo "bin/driver is statically linked"
        fi
        DOCKER
